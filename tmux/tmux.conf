# tmux config

# 256 + truecolor + extended keys for ghostty
set -g  default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -as terminal-features  ",xterm-ghostty:extkeys,RGB"

# Alt/Meta combos: kill 500ms escape delay
set -sg escape-time 10

# Pass modifyOtherKeys / extended keys (Ctrl+Shift, Alt, Shift+arrows)
set -s  extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Mouse: wheel scroll, drag-select, pane resize
set -g mouse on

# Big scrollback (per-pane, set at pane creation)
set -g history-limit 50000

# Don't shrink pane history when other client smaller
setw -g aggressive-resize on

# Focus events for editors (vim/micro autoread etc)
set -g focus-events on

# Pane-scoped mouse selection → system clipboard (OSC 52)
set -g set-clipboard on
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Source local overrides if present
if-shell "[ -f ~/.tmux.conf.local ]" "source ~/.tmux.conf.local"
